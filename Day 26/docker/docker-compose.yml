
version: '3.8'
services:
  backend:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - mysql
      - mongodb
    environment:
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      MYSQL_HOST: mysql
      MYSQL_DB: inventory_db
      MONGO_URI: mongodb://mongodb:27017
      MONGO_DB: inventory_logs

  mysql:
    image: mysql:8
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: inventory_db
    ports:
      - "3306:3306"

  mongodb:
    image: mongo
    ports:
      - "27017:27017"
